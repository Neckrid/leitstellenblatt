<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LSPD Verwaltung</title>

  <!-- Global Theme (identisch Leitstellenblatt) -->
  <link rel="stylesheet" href="shared/theme.css"/>

  <!-- Libs -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

  <!-- Shared Header/Login Loader -->
  <script src="shared/layout.js"></script>

  <style>
    /* ========================= */
    /* Verwaltung Layout (Theme identisch) */
    /* ========================= */

    .app{
      height:100%;
      display:grid;
      gap:14px;
      padding:14px;
      padding-top: var(--appTopPad);
      grid-template-columns: var(--leftW, 420px) 1fr;
      transition: grid-template-columns .25s ease;
      min-height:0;
    }
    .app.leftCollapsed{ --leftW: 0px; }

    .panel{
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(14, 18, 28, 0.55);
      backdrop-filter: blur(10px);
      border-radius:18px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:0;
      min-width:0;
      position:relative;
    }

    .panel.collapseX{ transition: opacity .18s ease, transform .25s ease; }
    .app.leftCollapsed #panelLeft{ opacity:0; transform: translateX(-10px); pointer-events:none; }

    .panelHeader{
      padding:14px 14px 12px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      min-width:0;
    }
    /* Platz für Dock-Button, damit nix überdeckt */
    #panelLeft .panelHeader{ padding-right:64px; }

    .brand{ display:flex; gap:10px; align-items:center; min-width:0; }
    .titleWrap{ line-height:1.05; min-width:0; }
    .title{
      font-size:14px;
      font-weight:800;
      letter-spacing:0.6px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .subtitle{
      font-size:12px;
      opacity:0.75;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .content{ padding:14px; overflow:auto; min-height:0; }

    .field{
      background: rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:14px;
      padding:10px;
    }

    .muted{ opacity:0.75; font-size:12px; }

    /* Dock / Toggle Buttons (wie Leitstellenblatt) */
    .dockBtn{
      position:absolute;
      top:12px;
      width:34px;
      height:34px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      font-weight:900;
      transition: transform .08s ease, background .2s ease, opacity .2s ease;
      z-index:5;
    }
    .dockBtn:hover{ background: rgba(255,255,255,0.12); }
    .dockBtn:active{ transform: translateY(1px); }
    #btnToggleLeft{ right:12px; }

    .edgeBtn{
      position:fixed;
      top: calc(var(--appTopPad) + 12px);
      left:10px;
      width:36px;
      height:42px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      display:none;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      font-weight:900;
      z-index:950;
      transition: background .2s ease, transform .08s ease;
    }
    .edgeBtn:hover{ background: rgba(255,255,255,0.12); }
    .edgeBtn:active{ transform: translateY(1px); }
    .app.leftCollapsed ~ #edgeLeft{ display:flex; }

    /* ========================= */
    /* Abteilungen Header Fix: Text + Badge nach rechts */
    /* (damit Slide-Button nichts überdeckt) */
    /* ========================= */
    .deptHeaderRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .deptHeaderLeft{
      display:flex;
      align-items:center;
      gap:10px;
      /* ✅ das ist der eigentliche Fix */
      padding-left: 52px; /* schiebt "Abteilungen" + Badge nach rechts */
      min-width:0;
    }
    .deptHeaderLeft .title{
      margin:0;
    }

    /* Horizontales Scrollen (nice für viele Abteilungen) */
    .deptScroll{
      display:flex;
      gap:12px;
      overflow:auto;
      padding-bottom:6px;
      scroll-behavior:smooth;
    }
    .deptCard{
      min-width: 340px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      border-radius:18px;
      overflow:hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    }
    .deptCardHead{
      padding:12px 12px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .deptCardBody{
      padding:12px;
    }

    /* Mobile */
    @media (max-width: 1200px){
      body{ overflow:auto; }
      :root{ --appTopPad: calc(var(--hdrH) + 10px); }
      .app{ height:auto; grid-template-columns: 1fr; }
      #btnToggleLeft{ display:none; }
      .deptHeaderLeft{ padding-left: 0px; }
      .edgeBtn{ display:none !important; }
    }

    /* Toast */
    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(10,12,18,0.72);
      backdrop-filter: blur(10px);
      opacity:0;
      pointer-events:none;
      transition: opacity .2s ease, transform .2s ease;
      font-size:13px;
      z-index:998;
    }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(-2px); }
  </style>
</head>

<body>
  <!-- APP -->
  <div class="app" id="app" style="display:none;">
    <!-- LEFT: Officer Pool -->
    <section class="panel collapseX" id="panelLeft">
      <div class="dockBtn" id="btnToggleLeft" title="Links ein/aus">❮</div>

      <div class="panelHeader">
        <div class="brand">
          <div class="badge">LSPD</div>
          <div class="titleWrap">
            <div class="title">OFFICER POOL</div>
            <div class="subtitle">Drag & Drop in Abteilungen</div>
          </div>
        </div>
      </div>

      <div class="content">
        <div class="field">
          <label>Suche</label>
          <input id="inpSearchPool" placeholder="Name / DN / Rang"/>
          <div style="height:10px"></div>
          <div class="muted" id="poolHint">—</div>
          <div style="height:10px"></div>
          <div id="poolList" class="muted">Pool lädt…</div>
        </div>
      </div>
    </section>

    <!-- CENTER: Abteilungen -->
    <section class="panel" id="panelCenter">
      <div class="panelHeader">
        <div class="deptHeaderRow" style="width:100%;">
          <div class="deptHeaderLeft">
            <div class="titleWrap" style="min-width:0;">
              <div class="title">ABTEILUNGEN</div>
              <div class="subtitle">Leitung / Stv. Leitung / Mitglieder</div>
            </div>
            <span class="badge" id="deptCountBadge">0</span>
          </div>

          <div style="display:flex; gap:10px; align-items:center;">
            <button class="btn" id="btnAddDept" type="button">+ Abteilung</button>
          </div>
        </div>
      </div>

      <div class="content">
        <div class="deptScroll" id="deptScroll">
          <!-- Cards werden per JS gerendert -->
        </div>
      </div>
    </section>
  </div>

  <!-- Edge Button (wenn links eingeklappt) -->
  <div class="edgeBtn" id="edgeLeft" title="Links öffnen">❯</div>

  <div class="toast" id="toast"></div>

  <script>
    (async function(){
      await window.__layoutReady;

      // ===== Header Setup (identisch Theme / Login) =====
      UI.setHeader("LSPD Verwaltung", "Abteilungen & Officer Pool");
      UI.setPresenceVisible(false); // ✅ Verwaltung: kein Leitstelle Online/Offline
      UI.setExtraHTML(`
        <span class="pill" title="Rolle">
          <span class="dot warn" id="roleDot"></span>
          <span id="roleText">guest</span>
        </span>
        <a class="btn btnGhost" href="index.html" style="text-decoration:none;">Zur Leitstelle</a>
      `);

      // ===== Toast =====
      const toastEl = document.getElementById("toast");
      function toast(msg){
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        setTimeout(() => toastEl.classList.remove("show"), 2200);
      }

      // ===== Supabase (gleiche Config wie Leitstellenblatt) =====
      const SUPABASE_URL = "https://vuowfnmavgfkvabdtelx.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmR0ZWx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTM1MjQsImV4cCI6MjA4Nzg2OTUyNH0.R-oI8UzrP_ovDePN11wN2zFDifERkMOHZfNckjHLwhg";

      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        realtime: { params: { eventsPerSecond: 10 } }
      });

      const LEITSTELLE_EMAIL = "leitstelle@gta.local";
      const OFFICER_EMAIL = "officer@gta.local";
      const ADMIN_EMAIL = "admin@gta.local";

      // ===== DOM (Login kommt aus shared/partials/login.html) =====
      const app = document.getElementById("app");
      const inpLoginName = document.getElementById("inpLoginName");
      const inpLoginPw = document.getElementById("inpLoginPw");
      const btnLogin = document.getElementById("btnLogin");
      const loginErr = document.getElementById("loginErr");
      const btnLogout = document.getElementById("btnLogout");

      // Header role pills
      const roleText = document.getElementById("roleText");
      const roleDot  = document.getElementById("roleDot");

      // Panels
      const panelApp = document.getElementById("app");
      const panelLeft = document.getElementById("panelLeft");
      const btnToggleLeft = document.getElementById("btnToggleLeft");
      const edgeLeft = document.getElementById("edgeLeft");

      // Verwaltung UI
      const deptScroll = document.getElementById("deptScroll");
      const deptCountBadge = document.getElementById("deptCountBadge");
      const btnAddDept = document.getElementById("btnAddDept");
      const inpSearchPool = document.getElementById("inpSearchPool");
      const poolList = document.getElementById("poolList");
      const poolHint = document.getElementById("poolHint");

      function normalizeSpaces(s){ return (s ?? "").toString().replace(/\s+/g, " ").trim(); }
      function normalizeKey(name){ return normalizeSpaces(name).toLowerCase(); }
      function emailFromName(name){
        const key = normalizeKey(name);
        return key ? `${key}@gta.local` : "";
      }

      function friendlyAuthError(error){
        const msg = (error?.message || "").toLowerCase();
        if(msg.includes("invalid login") || msg.includes("invalid credentials") || msg.includes("invalid email or password")){
          return "Falscher Name oder Passwort.";
        }
        if(msg.includes("email not confirmed")){
          return "Account ist noch nicht bestätigt.";
        }
        if(msg.includes("too many requests") || msg.includes("rate limit")){
          return "Zu viele Versuche. Bitte kurz warten.";
        }
        return "Login fehlgeschlagen.";
      }

      function showLogin(errMsg=""){
        UI.showLogin(errMsg);
        app.style.display = "none";
        loginErr.style.display = errMsg ? "block" : "none";
        loginErr.textContent = errMsg || "";
      }
      function hideLogin(){
        UI.hideLogin();
        app.style.display = "grid";
      }

      // ===== Permissions (gleiches Rollenprinzip) =====
      const perms = { email:"", role:"guest" };
      function setRoleFromEmail(email){
        const e = (email || "").toLowerCase().trim();
        perms.email = e;

        if(e === ADMIN_EMAIL) perms.role = "admin";
        else if(e === LEITSTELLE_EMAIL) perms.role = "leitstelle";
        else if(e === OFFICER_EMAIL) perms.role = "officer";
        else if(e) perms.role = "user";
        else perms.role = "guest";

        roleText.textContent = perms.role;

        roleDot.classList.remove("ok","warn","off","on");
        if(perms.role === "admin") roleDot.classList.add("ok");
        else if(perms.role === "leitstelle") roleDot.classList.add("warn");
        else if(perms.role === "officer") roleDot.classList.add("off");
        else if(perms.role === "user") roleDot.classList.add("warn");
        else roleDot.classList.add("off");
      }

      // ===== Collapsible Left Panel =====
      const LS_UI = "lspd_admin_ui_left";
      function loadUi(){
        try{ return localStorage.getItem(LS_UI) === "1"; }catch{ return false; }
      }
      function saveUi(v){ try{ localStorage.setItem(LS_UI, v ? "1":"0"); }catch{} }
      let leftCollapsed = loadUi();

      function applyUi(){
        panelApp.classList.toggle("leftCollapsed", leftCollapsed);
        btnToggleLeft.textContent = leftCollapsed ? "❯" : "❮";
      }

      btnToggleLeft.addEventListener("click", ()=>{
        leftCollapsed = !leftCollapsed;
        saveUi(leftCollapsed);
        applyUi();
      });

      edgeLeft.addEventListener("click", ()=>{
        leftCollapsed = false;
        saveUi(leftCollapsed);
        applyUi();
      });

      // ===== Minimal Demo Render (damit die Seite nicht “leer” wirkt) =====
      // -> Wenn du schon eine fertige Verwaltung-Logik hast, kannst du unten bei
      //    "HIER DEIN ORIGINAL-VERWALTUNGS-JS" einfach deinen Code einfügen und
      //    diese Demo-Renderer entfernen.
      let departments = [];
      let pool = [];

      function renderDepartments(){
        deptCountBadge.textContent = departments.length;
        if(!departments.length){
          deptScroll.innerHTML = `
            <div class="deptCard">
              <div class="deptCardHead">
                <div style="display:flex; align-items:center; gap:10px;">
                  <div class="badge">i</div>
                  <div>
                    <div style="font-weight:900; letter-spacing:.4px;">Keine Abteilungen</div>
                    <div class="muted">Klicke „+ Abteilung“</div>
                  </div>
                </div>
              </div>
              <div class="deptCardBody" class="muted">
                <div class="muted">Du kannst hier später deine echte Abteilungs-Logik rendern.</div>
              </div>
            </div>
          `;
          return;
        }

        deptScroll.innerHTML = departments.map(d => `
          <div class="deptCard" data-id="${d.id}">
            <div class="deptCardHead">
              <div style="min-width:0;">
                <div style="font-weight:900; letter-spacing:.4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(d.name)}</div>
                <div class="muted">Mitglieder: ${d.members?.length || 0}</div>
              </div>
              <button class="btn btnGhost" data-act="delDept" data-id="${d.id}" title="Löschen">✕</button>
            </div>
            <div class="deptCardBody">
              <div class="muted">Drop-Zone / Leitung / Stv. Leitung kannst du hier wie gewohnt einbauen.</div>
            </div>
          </div>
        `).join("");

        deptScroll.querySelectorAll("button[data-act='delDept']").forEach(b=>{
          b.addEventListener("click", ()=>{
            const id = b.getAttribute("data-id");
            departments = departments.filter(x => x.id !== id);
            renderDepartments();
          });
        });
      }

      function escapeHtml(s){
        return (s ?? "").toString().replace(/[&<>"']/g, m => ({
          "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
        }[m]));
      }

      function renderPool(){
        const q = (inpSearchPool.value || "").trim().toLowerCase();
        const list = pool.filter(o => !q || (o.name||"").toLowerCase().includes(q) || (o.dn||"").toLowerCase().includes(q));
        poolHint.textContent = `Pool: ${list.length}`;
        poolList.innerHTML = list.length
          ? list.map(o => `<div class="field" style="margin-bottom:10px;"><b>${escapeHtml(o.name)}</b><div class="muted">DN ${escapeHtml(o.dn||"—")}</div></div>`).join("")
          : `<div class="muted">Keine Treffer.</div>`;
      }

      inpSearchPool.addEventListener("input", renderPool);

      btnAddDept.addEventListener("click", ()=>{
        const id = "d-" + Math.random().toString(16).slice(2);
        departments.push({ id, name: "Neue Abteilung", members: [] });
        renderDepartments();
        toast("Abteilung erstellt (Demo)");
      });

      // ===== LOGIN / LOGOUT =====
      async function doLogin(){
        const name = normalizeSpaces(inpLoginName.value);
        const pw = (inpLoginPw.value ?? "").toString();

        loginErr.style.display = "none";
        loginErr.textContent = "";

        if(!name) return showLogin("Bitte Namen eingeben.");
        if(!pw) return showLogin("Bitte Passwort eingeben.");

        const email = emailFromName(name);

        try{
          btnLogin.disabled = true;
          btnLogin.textContent = "Login…";

          const { error } = await sb.auth.signInWithPassword({ email, password: pw });
          if(error) throw error;

          toast("Eingeloggt");
        }catch(e){
          console.error(e);
          showLogin(friendlyAuthError(e));
        }finally{
          btnLogin.disabled = false;
          btnLogin.textContent = "Login";
        }
      }

      async function doLogout(){
        showLogin("");
        toast("Ausgeloggt");

        setRoleFromEmail("");

        try{
          const { error } = await sb.auth.signOut();
          if(error) console.error("signOut error:", error);
        }catch(e){
          console.error("signOut throw:", e);
        }
      }

      btnLogin.addEventListener("click", doLogin);
      inpLoginName.addEventListener("keydown", (e)=>{ if(e.key === "Enter"){ e.preventDefault(); doLogin(); }});
      inpLoginPw.addEventListener("keydown", (e)=>{ if(e.key === "Enter"){ e.preventDefault(); doLogin(); }});

      btnLogout.addEventListener("click", (e)=>{ e.preventDefault(); doLogout(); });

      // ===== AUTH INIT =====
      applyUi();
      setRoleFromEmail("");

      try{
        const { data } = await sb.auth.getSession();
        const session = data?.session;

        if(session){
          hideLogin();
        }else{
          showLogin("");
        }
      }catch(e){
        console.error(e);
        showLogin("Auth-Fehler.");
      }

      sb.auth.onAuthStateChange(async (_evt, session) => {
        if(session){
          hideLogin();
          const email = (session.user?.email || "").toLowerCase();
          setRoleFromEmail(email);

          // Demo Seed (nur damit sichtbar)
          pool = [
            { name:"John Doe", dn:"4711" },
            { name:"Jane Smith", dn:"1001" },
            { name:"Alex Carter", dn:"2090" }
          ];
          renderPool();
          renderDepartments();

          // ===== HIER DEIN ORIGINAL-VERWALTUNGS-JS =====
          // Wenn du schon eine fertige Verwaltung hast:
          // - ersetze die Demo-Renderer oben
          // - und füge hier deinen Original-Code ein (oder lade ihn als script).
        }else{
          setRoleFromEmail("");
          showLogin("");
        }
      });
    })();
  </script>
</body>
</html>
