<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LSPD Leitstelle – Sanktionskatalog</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Optional: wenn du schon globales Theme hast -->
  <link rel="stylesheet" href="shared/theme.css"/>

  <style>
    /* Fallback-Style, falls theme.css nicht alles abdeckt */
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      color:#fff;
      overflow:hidden;
      background:
        radial-gradient(1200px 700px at 12% 18%, rgba(0,255,195,0.10), transparent 60%),
        radial-gradient(900px 650px at 88% 72%, rgba(255,70,180,0.08), transparent 62%),
        radial-gradient(760px 520px at 72% 20%, rgba(120,140,255,0.08), transparent 60%),
        linear-gradient(180deg, #070A10 0%, #05070C 100%);
    }

    :root{
      --stroke: rgba(255,255,255,0.10);
      --stroke2: rgba(255,255,255,0.14);
      --muted: rgba(255,255,255,0.75);
      --muted2: rgba(255,255,255,0.55);
      --shadow: 0 20px 60px rgba(0,0,0,0.55);
      --shadow2: 0 14px 36px rgba(0,0,0,0.45);
      --hdrH: 64px;
      --appPad: 14px;
      --glass: rgba(18,22,32,0.62);
      --glass2: rgba(16,20,28,0.48);
      --ok: rgba(0,255,195,0.22);
      --warn: rgba(255,200,0,0.18);
      --danger: rgba(255,70,70,0.22);
    }

    /* Header */
    .hdr{
      position:fixed; inset:0 0 auto 0;
      height:var(--hdrH);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 14px;
      background: linear-gradient(180deg, rgba(10,14,22,0.85), rgba(10,14,22,0.35));
      backdrop-filter: blur(12px);
      border-bottom:1px solid var(--stroke);
      z-index:50;
    }
    .hdrLeft{ display:flex; align-items:center; gap:10px; min-width:0; }
    .brand{
      display:flex; align-items:center; gap:10px;
      font-weight:800; letter-spacing:.3px;
      white-space:nowrap;
    }
    .dot{
      width:10px; height:10px; border-radius:50%;
      background: rgba(0,255,195,0.9);
      box-shadow: 0 0 0 3px rgba(0,255,195,0.18);
    }
    .hdrSub{
      font-size:12px; color:var(--muted2);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .hdrRight{ display:flex; align-items:center; gap:10px; }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 10px;
      border:1px solid var(--stroke);
      border-radius:999px;
      background: rgba(0,0,0,0.18);
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }
    .btn{
      appearance:none; border:1px solid var(--stroke);
      background: rgba(255,255,255,0.06);
      color:#fff;
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      box-shadow: 0 12px 28px rgba(0,0,0,0.25);
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }
    .btn:hover{ transform: translateY(-1px); border-color: var(--stroke2); background: rgba(255,255,255,0.09); }
    .btn.red{
      border-color: rgba(255,70,70,0.35);
      background: rgba(255,70,70,0.14);
    }
    .btn.red:hover{ background: rgba(255,70,70,0.18); }
    .btn.primary{
      border-color: rgba(0,255,195,0.30);
      background: rgba(0,255,195,0.14);
    }
    .btn.primary:hover{ background: rgba(0,255,195,0.18); }
    .btn.ghost{ background: transparent; box-shadow:none; }

    /* Layout */
    .app{
      height:100%;
      padding: var(--appPad);
      padding-top: calc(var(--hdrH) + var(--appPad));
      display:grid;
      grid-template-columns: 420px 1fr;
      gap:14px;
      min-height:0;
    }
    .card{
      background: var(--glass);
      border:1px solid var(--stroke);
      border-radius:18px;
      box-shadow: var(--shadow2);
      backdrop-filter: blur(12px);
      min-height:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .cardHead{
      padding:12px 12px 10px;
      border-bottom:1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.0));
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .cardTitle{ font-weight:800; }
    .cardSub{ font-size:12px; color:var(--muted2); margin-top:3px; }
    .cardBody{ padding:12px; overflow:auto; min-height:0; }

    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .field{
      width:100%;
      display:flex; flex-direction:column; gap:6px;
      margin-bottom:10px;
    }
    label{ font-size:12px; color:var(--muted2); }
    input, select, textarea{
      width:100%;
      background: rgba(0,0,0,0.25);
      border:1px solid var(--stroke);
      color:#fff;
      border-radius:12px;
      padding:10px 12px;
      outline:none;
    }
    textarea{ min-height:84px; resize:vertical; }
    input:focus, select:focus, textarea:focus{ border-color: var(--stroke2); }

    .list{
      display:flex; flex-direction:column; gap:10px;
    }
    .item{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.04);
      border-radius:16px;
      padding:10px 10px;
    }
    .itemTop{
      display:flex; justify-content:space-between; gap:10px; align-items:flex-start;
    }
    .itemTitle{ font-weight:800; }
    .meta{ font-size:12px; color:var(--muted2); margin-top:4px; }
    .badge{
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 9px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(0,0,0,0.22);
      font-size:12px;
      white-space:nowrap;
    }
    .badge.ok{ border-color: rgba(0,255,195,0.35); background: rgba(0,255,195,0.14); }
    .badge.warn{ border-color: rgba(255,200,0,0.35); background: rgba(255,200,0,0.14); }
    .badge.danger{ border-color: rgba(255,70,70,0.35); background: rgba(255,70,70,0.14); }

    .split{
      display:grid; grid-template-columns: 1fr 1fr; gap:10px;
    }
    @media (max-width: 1100px){
      .app{ grid-template-columns: 1fr; }
    }

    /* Modal */
    .modalOverlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,0.55);
      display:none;
      align-items:center; justify-content:center;
      padding:16px;
      z-index:200;
    }
    .modal{
      width:min(680px, 96vw);
      background: rgba(16,20,28,0.78);
      border:1px solid var(--stroke2);
      border-radius:18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      overflow:hidden;
    }
    .modalHead{
      padding:12px 12px;
      border-bottom:1px solid var(--stroke);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .modalBody{ padding:12px; max-height: 70vh; overflow:auto; }
    .muted{ color:var(--muted2); font-size:12px; }
    .err{
      margin-top:8px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,70,70,0.35);
      background: rgba(255,70,70,0.12);
      color:#fff;
      display:none;
    }
  </style>
</head>
<body>

  <header class="hdr">
    <div class="hdrLeft">
      <div class="brand"><span class="dot"></span> LSPD Leitstelle</div>
      <div class="hdrSub">Sanktionskatalog</div>
    </div>
    <div class="hdrRight">
      <div class="pill" id="activeOfficerPill">Officer: <b id="activeOfficerLabel">—</b></div>
      <button class="btn" id="switchOfficerBtn">Officer wählen</button>
      <button class="btn red" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main class="app">
    <!-- LEFT: Katalog -->
    <section class="card">
      <div class="cardHead">
        <div>
          <div class="cardTitle">Katalog</div>
          <div class="cardSub">Suchen, filtern, Sanktion auswählen</div>
        </div>
        <button class="btn ghost" id="reloadCatalogBtn">Neu laden</button>
      </div>
      <div class="cardBody">
        <div class="field">
          <label>Suche</label>
          <input id="catalogSearch" type="text" placeholder="z.B. Funk, Verhalten, Gefährdung...">
        </div>

        <div class="split">
          <div class="field">
            <label>Kategorie</label>
            <select id="catalogCategory">
              <option value="">Alle</option>
            </select>
          </div>
          <div class="field">
            <label>Sortierung</label>
            <select id="catalogSort">
              <option value="cat">Kategorie → Sort → Titel</option>
              <option value="points">Punkte (hoch → runter)</option>
              <option value="fine">Geldstrafe (hoch → runter)</option>
              <option value="title">Titel (A → Z)</option>
            </select>
          </div>
        </div>

        <div class="list" id="catalogList"></div>
      </div>
    </section>

    <!-- RIGHT: Verhängen + Verlauf -->
    <section class="card">
      <div class="cardHead">
        <div>
          <div class="cardTitle">Sanktion verhängen</div>
          <div class="cardSub">Wähle Ziel-Officer und Katalog-Eintrag</div>
        </div>
      </div>
      <div class="cardBody">
        <div class="split">
          <div class="field">
            <label>Ziel-Officer</label>
            <select id="targetOfficerSelect"></select>
          </div>
          <div class="field">
            <label>Ausgewählte Sanktion</label>
            <input id="selectedSanction" type="text" placeholder="Aus Katalog anklicken…" readonly>
          </div>
        </div>

        <div class="split">
          <div class="field">
            <label>Punkte</label>
            <input id="selectedPoints" type="number" readonly>
          </div>
          <div class="field">
            <label>Geldstrafe</label>
            <input id="selectedFine" type="number" readonly>
          </div>
        </div>

        <div class="field">
          <label>Notizen / Begründung (optional)</label>
          <textarea id="sanctionNotes" placeholder="Freitext…"></textarea>
        </div>

        <div class="row">
          <button class="btn primary" id="issueBtn">Sanktion speichern</button>
          <button class="btn" id="loadHistoryBtn">Verlauf laden</button>
          <span class="muted" id="statusText"></span>
        </div>

        <div class="err" id="errorBox"></div>

        <div style="height:12px"></div>

        <div class="cardTitle" style="font-size:14px;">Verlauf (Ziel-Officer)</div>
        <div class="muted" style="margin:6px 0 10px;">Neueste Einträge oben</div>
        <div class="list" id="historyList"></div>
      </div>
    </section>
  </main>

  <!-- Officer Picker Modal -->
  <div class="modalOverlay" id="officerModal">
    <div class="modal">
      <div class="modalHead">
        <div>
          <div class="cardTitle">Officer auswählen</div>
          <div class="muted">Wird lokal gespeichert (shared Login: officer@gta.local)</div>
        </div>
        <button class="btn" id="closeOfficerModalBtn">Schließen</button>
      </div>
      <div class="modalBody">
        <div class="field">
          <label>Suche</label>
          <input id="officerSearch" type="text" placeholder="Name / Dienstnummer…">
        </div>
        <div class="list" id="officerPickList"></div>
      </div>
    </div>
  </div>

<script>
/* ===========================
   CONFIG
=========================== */
const SUPABASE_URL = "https://vuowfnmavgfkvabdtelx.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1b3dmbm1hdmdma3ZhYmR0ZWx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTM1MjQsImV4cCI6MjA4Nzg2OTUyNH0.R-oI8UzrP_ovDePN11wN2zFDifERkMOHZfNckjHLwhg";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ACTIVE_OFFICER_KEY = "lspd_active_officer_id";

/* ===========================
   HELPERS
=========================== */
const $ = (sel) => document.querySelector(sel);
function showError(msg){
  const box = $("#errorBox");
  box.style.display = "block";
  box.textContent = msg;
}
function clearError(){
  const box = $("#errorBox");
  box.style.display = "none";
  box.textContent = "";
}
function setStatus(msg){
  $("#statusText").textContent = msg || "";
}
function fmtDate(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleString("de-DE");
  }catch(e){ return iso; }
}
function getActiveOfficerId(){ return localStorage.getItem(ACTIVE_OFFICER_KEY); }
function setActiveOfficerId(id){ localStorage.setItem(ACTIVE_OFFICER_KEY, id); }
function clearActiveOfficer(){ localStorage.removeItem(ACTIVE_OFFICER_KEY); }

/* ===========================
   AUTH CHECK (optional)
=========================== */
async function ensureSession(){
  const { data } = await supabase.auth.getSession();
  if(!data?.session){
    alert("Nicht eingeloggt. Bitte zuerst im Leitstellenblatt einloggen.");
    // Optional: window.location.href = "index.html";
    return false;
  }
  return true;
}

/* ===========================
   DATA LOADERS
=========================== */
async function fetchOfficers(){
  // Passe die Spalten an, falls sie bei dir anders heißen
  const { data, error } = await supabase
    .from("officers")
    .select("id, name, badge_number, rank")
    .order("name", { ascending: true });
  if(error) throw error;
  return data || [];
}

async function loadCatalog(){
  const { data, error } = await supabase
    .from("sanction_catalog")
    .select("id, category, title, description, points, fine, active, sort")
    .eq("active", true)
    .order("category", { ascending: true })
    .order("sort", { ascending: true })
    .order("title", { ascending: true });
  if(error) throw error;
  return data || [];
}

async function loadSanctionsForOfficer(officerId){
  const { data, error } = await supabase
    .from("sanctions")
    .select("id, created_at, title, category, points, fine, notes, issued_by_officer_id")
    .eq("target_officer_id", officerId)
    .order("created_at", { ascending: false });
  if(error) throw error;
  return data || [];
}

async function issueSanction(payload){
  const { error } = await supabase.from("sanctions").insert(payload);
  if(error) throw error;
}

/* ===========================
   OFFICER PICKER
=========================== */
let OFFICERS = [];
function openOfficerModal(){ $("#officerModal").style.display = "flex"; }
function closeOfficerModal(){ $("#officerModal").style.display = "none"; }

function officerLabel(o){
  const parts = [o.name];
  if(o.badge_number) parts.push(o.badge_number);
  if(o.rank) parts.push(o.rank);
  return parts.join(" • ");
}

function renderOfficerPickList(filter=""){
  const q = (filter||"").trim().toLowerCase();
  const list = $("#officerPickList");
  list.innerHTML = "";

  const rows = OFFICERS.filter(o=>{
    const hay = `${o.name||""} ${o.badge_number||""} ${o.rank||""}`.toLowerCase();
    return !q || hay.includes(q);
  });

  if(!rows.length){
    list.innerHTML = `<div class="muted">Keine Treffer.</div>`;
    return;
  }

  rows.forEach(o=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="itemTop">
        <div>
          <div class="itemTitle">${o.name || "—"}</div>
          <div class="meta">${officerLabel(o)}</div>
        </div>
        <button class="btn primary">Auswählen</button>
      </div>
    `;
    div.querySelector("button").addEventListener("click", ()=>{
      setActiveOfficerId(o.id);
      $("#activeOfficerLabel").textContent = o.name || "—";
      closeOfficerModal();
    });
    list.appendChild(div);
  });
}

async function ensureActiveOfficer(){
  let id = getActiveOfficerId();
  if(id){
    const me = OFFICERS.find(o=>o.id === id);
    if(me) $("#activeOfficerLabel").textContent = me.name || "—";
    return id;
  }
  openOfficerModal();
  return null;
}

/* ===========================
   CATALOG UI
=========================== */
let CATALOG = [];
let selectedCatalogItem = null;

function sortCatalog(arr, mode){
  const a = [...arr];
  if(mode === "points"){
    a.sort((x,y)=> (y.points||0) - (x.points||0));
  }else if(mode === "fine"){
    a.sort((x,y)=> (y.fine||0) - (x.fine||0));
  }else if(mode === "title"){
    a.sort((x,y)=> (x.title||"").localeCompare(y.title||""));
  }else{
    // cat default
    a.sort((x,y)=>
      (x.category||"").localeCompare(y.category||"")
      || (x.sort||0) - (y.sort||0)
      || (x.title||"").localeCompare(y.title||"")
    );
  }
  return a;
}

function badgeFor(item){
  const p = item.points || 0;
  if(p >= 5) return "danger";
  if(p >= 2) return "warn";
  return "ok";
}

function renderCatalog(){
  const q = ($("#catalogSearch").value || "").trim().toLowerCase();
  const cat = $("#catalogCategory").value;
  const sortMode = $("#catalogSort").value;

  let rows = CATALOG.filter(x=>x.active !== false);
  if(cat) rows = rows.filter(x=>x.category === cat);
  if(q){
    rows = rows.filter(x=>{
      const hay = `${x.category||""} ${x.title||""} ${x.description||""}`.toLowerCase();
      return hay.includes(q);
    });
  }
  rows = sortCatalog(rows, sortMode);

  const list = $("#catalogList");
  list.innerHTML = "";
  if(!rows.length){
    list.innerHTML = `<div class="muted">Keine Einträge.</div>`;
    return;
  }

  rows.forEach(item=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="itemTop">
        <div style="min-width:0;">
          <div class="itemTitle">${item.title}</div>
          <div class="meta">${item.category}</div>
        </div>
        <div class="row" style="gap:8px;">
          <span class="badge ${badgeFor(item)}">${item.points||0} P</span>
          <span class="badge">${item.fine||0} $</span>
          <button class="btn primary">Wählen</button>
        </div>
      </div>
      <div class="meta" style="margin-top:8px;">${item.description}</div>
    `;

    div.querySelector("button").addEventListener("click", ()=>{
      selectedCatalogItem = item;
      $("#selectedSanction").value = `${item.category} – ${item.title}`;
      $("#selectedPoints").value = item.points ?? 0;
      $("#selectedFine").value = item.fine ?? 0;
      setStatus("Sanktion ausgewählt.");
    });

    list.appendChild(div);
  });
}

function fillCategoryFilter(){
  const sel = $("#catalogCategory");
  const cats = Array.from(new Set(CATALOG.map(x=>x.category).filter(Boolean))).sort((a,b)=>a.localeCompare(b));
  sel.innerHTML = `<option value="">Alle</option>` + cats.map(c=>`<option value="${c}">${c}</option>`).join("");
}

/* ===========================
   TARGET OFFICER SELECT + HISTORY
=========================== */
function fillTargetOfficerSelect(){
  const sel = $("#targetOfficerSelect");
  sel.innerHTML = OFFICERS.map(o=>{
    const label = officerLabel(o);
    return `<option value="${o.id}">${label}</option>`;
  }).join("");
}

async function renderHistory(){
  const targetId = $("#targetOfficerSelect").value;
  if(!targetId) return;
  const rows = await loadSanctionsForOfficer(targetId);

  const list = $("#historyList");
  list.innerHTML = "";
  if(!rows.length){
    list.innerHTML = `<div class="muted">Noch keine Sanktionen.</div>`;
    return;
  }

  rows.forEach(s=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="itemTop">
        <div>
          <div class="itemTitle">${s.title}</div>
          <div class="meta">${s.category} • ${fmtDate(s.created_at)}</div>
        </div>
        <div class="row" style="gap:8px;">
          <span class="badge ${ (s.points||0)>=5 ? "danger" : (s.points||0)>=2 ? "warn" : "ok"}">${s.points||0} P</span>
          <span class="badge">${s.fine||0} $</span>
        </div>
      </div>
      ${s.notes ? `<div class="meta" style="margin-top:8px;">${s.notes}</div>` : ``}
    `;
    list.appendChild(div);
  });
}

/* ===========================
   ACTIONS
=========================== */
async function handleIssue(){
  clearError();
  try{
    const ok = await ensureSession();
    if(!ok) return;

    const issuedBy = getActiveOfficerId();
    if(!issuedBy){
      openOfficerModal();
      throw new Error("Bitte zuerst deinen Officer auswählen.");
    }
    const targetId = $("#targetOfficerSelect").value;
    if(!targetId) throw new Error("Bitte Ziel-Officer wählen.");
    if(!selectedCatalogItem) throw new Error("Bitte eine Sanktion aus dem Katalog auswählen.");

    const payload = {
      target_officer_id: targetId,
      catalog_item_id: selectedCatalogItem.id,
      issued_by_officer_id: issuedBy,
      title: selectedCatalogItem.title,
      category: selectedCatalogItem.category,
      points: selectedCatalogItem.points ?? 0,
      fine: selectedCatalogItem.fine ?? 0,
      notes: ($("#sanctionNotes").value || "").trim() || null
    };

    await issueSanction(payload);
    $("#sanctionNotes").value = "";
    setStatus("Gespeichert.");
    await renderHistory();
  }catch(e){
    showError(e?.message || String(e));
  }
}

/* ===========================
   INIT
=========================== */
async function init(){
  clearError();
  setStatus("Lade…");
  try{
    const ok = await ensureSession();
    if(!ok) return;

    OFFICERS = await fetchOfficers();
    if(!OFFICERS.length) throw new Error("Keine Officers in 'officers' gefunden.");

    fillTargetOfficerSelect();

    CATALOG = await loadCatalog();
    fillCategoryFilter();
    renderCatalog();

    // active officer anzeigen / ggf. modal öffnen
    await ensureActiveOfficer();

    setStatus("Bereit.");
  }catch(e){
    showError(e?.message || String(e));
    setStatus("");
  }
}

$("#reloadCatalogBtn").addEventListener("click", async ()=>{
  clearError(); setStatus("Lade Katalog…");
  try{
    CATALOG = await loadCatalog();
    fillCategoryFilter();
    renderCatalog();
    setStatus("Katalog aktualisiert.");
  }catch(e){
    showError(e?.message || String(e));
    setStatus("");
  }
});

$("#catalogSearch").addEventListener("input", renderCatalog);
$("#catalogCategory").addEventListener("change", renderCatalog);
$("#catalogSort").addEventListener("change", renderCatalog);

$("#issueBtn").addEventListener("click", handleIssue);
$("#loadHistoryBtn").addEventListener("click", async ()=>{
  clearError(); setStatus("Lade Verlauf…");
  try{ await renderHistory(); setStatus("Verlauf geladen."); }
  catch(e){ showError(e?.message || String(e)); setStatus(""); }
});
$("#targetOfficerSelect").addEventListener("change", ()=>{ renderHistory(); });

$("#switchOfficerBtn").addEventListener("click", ()=>{
  openOfficerModal();
});

$("#closeOfficerModalBtn").addEventListener("click", closeOfficerModal);
$("#officerModal").addEventListener("click", (e)=>{
  if(e.target === $("#officerModal")) closeOfficerModal();
});
$("#officerSearch").addEventListener("input", (e)=> renderOfficerPickList(e.target.value));

$("#logoutBtn").addEventListener("click", async ()=>{
  await supabase.auth.signOut();
  clearActiveOfficer();
  alert("Ausgeloggt.");
  // Optional: window.location.href = "index.html";
});

window.addEventListener("load", async ()=>{
  await init();
  // Picker list initial render
  renderOfficerPickList("");
});
</script>
</body>
</html>
